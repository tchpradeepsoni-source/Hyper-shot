 <!DOCTYPE html>
<html>

<head>
  <title>Moving Click Game</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, blue, purple);
      color: white;
    }

    #gameArea {
      display: none;
      position: relative;
      height: 400px;
      border: 2px solid white;
      margin-top: 20px;
    }

    #gameBtn {
      position: absolute;
      padding: 15px;
      font-size: 18px;
      background: orange;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #startBtn, #restartBtn {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>

</head>

<body>

  <h1>Moving Click Game 🎮</h1>

  <button id="startBtn" onclick="startGame()">Start</button>

  <div id="gameArea">
    <h2>Time: <span id="time">10</span></h2>
    <h2>Score: <span id="score">0</span></h2>
    <button id="gameBtn" onclick="increaseScore()">Catch Me!</button>
  </div>

  <h2 id="gameOver" style="display:none;"></h2>
  <button id="restartBtn" style="display:none;" onclick="location.reload()">Restart</button>

  <script>
    let score = 0;
    let time = 10;
    let moveInterval;
    let timer;

    function startGame() {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("gameArea").style.display = "block";

      moveInterval = setInterval(moveButton, 700);

      timer = setInterval(function () {
        time--;
        document.getElementById("time").innerHTML = time;

        if (time <= 0) {
          clearInterval(moveInterval);
          clearInterval(timer);

          document.getElementById("gameArea").style.display = "none";
          document.getElementById("gameOver").style.display = "block";
          document.getElementById("restartBtn").style.display = "block";

          document.getElementById("gameOver").innerHTML = "Game Over! Score: " + score;
        }
      }, 1000);
    }

    function moveButton() {
      let gameArea = document.getElementById("gameArea");
      let btn = document.getElementById("gameBtn");

      let maxX = gameArea.clientWidth - btn.offsetWidth;
      let maxY = gameArea.clientHeight - btn.offsetHeight;

      let randomX = Math.random() * maxX;
      let randomY = Math.random() * maxY;

      btn.style.left = randomX + "px";
      btn.style.top = randomY + "px";
    }

    function increaseScore() {
      score++;
      document.getElementById("score").innerHTML = score;
    }
  </script>

</body>

</html>
